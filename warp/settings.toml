[appearance]

[appearance.themes]
system_theme = false
theme = "adeberry"

[appearance.vertical_tabs]
enabled = false

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[appearance.icon]
app_icon = "default"

[appearance.window]
zoom_level = 90

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true

[warp_drive]
enabled = true

[agents]
cloud_conversation_storage_enabled = true

[agents.third_party]
should_render_cli_agent_toolbar = true

[agents.warp_agent]
is_any_ai_enabled = true

[agents.warp_agent.other]
show_agent_notifications = true

[agents.warp_agent.input]
nld_in_terminal_enabled = false

[text_editing]
vim_mode_enabled = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "dismissed"
play_notification_sound = true

[terminal]
show_terminal_zero_state_block = false

[terminal.input]
input_box_type_setting = "universal"

[account]
is_settings_sync_enabled = true

[privacy]
telemetry_enabled = true
crash_reporting_enabled = true
